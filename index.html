function startEvent(messages, friend=null){
document.querySelector(".crossKey").style.display = "none";
    eventMode = true;
document.getElementById("skillButtons").style.display = "none";
    eventMessages = messages;
    eventIndex = 0;

    joinFriend = friend;

    document.getElementById("field-screen").style.display = "none";
    document.getElementById("game-container").style.display = "block";

    document.getElementById("options").style.display = "none";

    showEventMessage();

}
function showEventMessage(){

    const msg = eventMessages[eventIndex];

    if(openingEvent){

        document.getElementById("monster-img").style.display = "none";

        document.getElementById("monster-area").style.backgroundImage =
            `url('${msg.img}')`;

    }else{

        document.getElementById("monster-img").style.display = "block";
        document.getElementById("monster-img").src = msg.img;
    }

    document.getElementById("text").innerHTML = msg.text;
}

function getMonsterEvadeRate(){

    if(currentMapIndex < 6){
        return 0.30; // エリア1 30%
    }
    else if(currentMapIndex < 12){
        return 0.40; // エリア2 40%
    }
    else if(currentMapIndex < 18){
        return 0.50; // エリア3 50%
    }
    else if(currentMapIndex < 24){
        return 0.60; // エリア4 60%
    }
    else{
        return 0.70; // エリア5 70%
    }
}
function getHitRate(){

    const evadeRate = getMonsterEvadeRate();

    let hitRate = 1 - evadeRate + (lv * 0.02);

    if(hitRate > 0.95){
        hitRate = 0.95;
    }

    return hitRate;
}

        seDamage.muted = false;

function updateMonsterBackground() {

    if(bossBattle){

        monsterArea.style.backgroundImage =
        "url('bg_boss.jpg')";
        return;
    }

    if(currentMapIndex < 6){

        monsterArea.style.backgroundImage =
        "url('bg_forest.jpg')";
    }
    else if(currentMapIndex < 12){

        monsterArea.style.backgroundImage =
        "url('bg_cave.jpg')";
    }
    else if(currentMapIndex < 18){

        monsterArea.style.backgroundImage =
        "url('bg1-1.jpg')";
    }

    }
}

        while(map[iy][ix] !== 0);

    map[1][1] = 0;
    map[1][2] = 0;
    map[2][1] = 0;
    map[2][2] = 0;

    return map;
