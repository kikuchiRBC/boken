function startEvent(messages, friend=null){
document.querySelector(".crossKey").style.display = "none";
    eventMode = true;
document.getElementById("skillButtons").style.display = "none";
    eventMessages = messages;
    eventIndex = 0;

    joinFriend = friend;

    document.getElementById("field-screen").style.display = "none";
    document.getElementById("game-container").style.display = "block";

    document.getElementById("options").style.display = "none";

    showEventMessage();

}
function showEventMessage(){

    const msg = eventMessages[eventIndex];

    if(openingEvent){

        document.getElementById("monster-img").style.display = "none";

        document.getElementById("monster-area").style.backgroundImage =
            `url('${msg.img}')`;

    }else{

        document.getElementById("monster-img").style.display = "block";
        document.getElementById("monster-img").src = msg.img;
    }

    document.getElementById("text").innerHTML = msg.text;
}

function getMonsterEvadeRate(){

    if(currentMapIndex < 6){
        return 0.30; // エリア1 30%
    }
    else if(currentMapIndex < 12){
        return 0.40; // エリア2 40%
    }
    else if(currentMapIndex < 18){
        return 0.50; // エリア3 50%
    }
    else if(currentMapIndex < 24){
        return 0.60; // エリア4 60%
    }
    else{
        return 0.70; // エリア5 70%
    }
}
function getHitRate(){

    const evadeRate = getMonsterEvadeRate();

    let hitRate = 1 - evadeRate + (lv * 0.02);

    if(hitRate > 0.95){
        hitRate = 0.95;
    }

    return hitRate;
}

function generateMap(index){

    const rows = 13;
    const cols = 13;

    const map = [];

    for(let y=0;y<rows;y++){

        map[y] = [];

        for(let x=0;x<cols;x++){

            if(
                y===0 ||
                y===rows-1 ||
                x===0 ||
                x===cols-1
            ){
                map[y][x] = 1;
            }else{
                map[y][x] = 0;
            }
        }
    }

    // 木配置
    const treeCount =
        Math.floor(Math.random()*10)+20;

    for(let i=0;i<treeCount;i++){

        const x = Math.floor(Math.random()*11)+1;
        const y = Math.floor(Math.random()*11)+1;

        if(!(x===1 && y===1)){

            map[y][x] = 2;
        }
    }

    // 階段配置
    let sx, sy;

    do{

        sx = Math.floor(Math.random()*11)+1;
        sy = Math.floor(Math.random()*11)+1;

    }while(map[sy][sx] !== 0);


    map[sy][sx] = 3;

    // 5階ごとに宿配置
    if(
        (index + 1) % 5 === 0 &&
        (index + 1) < 30
    ){

        let ix, iy;

        do{
            ix = Math.floor(Math.random()*11)+1;
            iy = Math.floor(Math.random()*11)+1;
        }
        while(map[iy][ix] !== 0);

        map[iy][ix] = 4;
    }

    


    // スタート周辺を空ける
    map[1][1] = 0;
    map[1][2] = 0;
    map[2][1] = 0;
    map[2][2] = 0;

    return map;
}

    );       }

        if(!pos) continue;

        const friendImage =
            friendSets[i][direction];



if(!friendImage){
    console.log("friend image undefined", i, direction);
    continue;
}

    !friendImage.complete ||
    friendImage.naturalWidth === 0
){

    continue;
}

ctx.drawImage(
    friendImage,
    pos.x * tileSize,
    pos.y * tileSize,
    tileSize,
    tileSize
);
    }

    let heroImage = heroDown;

    if(direction==="left") heroImage = heroLeft;
    if(direction==="right") heroImage = heroRight;
    if(direction==="up") heroImage = heroUp;
    if(direction==="down") heroImage = heroDown;

    heroImage.complete &&
    heroImage.naturalWidth > 0
){

        heroImage,
        player.x * tileSize,
        player.y * tileSize,
        tileSize,
        tileSize
    );

function movePlayer(dx,dy){

    if(dx > 0) direction = "right";
    if(dx < 0) direction = "left";
    if(dy < 0) direction = "up";
    if(dy > 0) direction = "down";

    const nx = player.x + dx;
    const ny = player.y + dy;

if(
    ny < 0 ||
    ny >= map.length ||
    nx < 0 ||
    nx >= map[0].length
){
 
        return;

}
if(
    map[ny][nx] === 0 ||
    map[ny][nx] === 3 ||
    map[ny][nx] === 4
){
    
trail.unshift({
    x: player.x,
    y: player.y
});

if(trail.length > 100){
    trail.pop();
}

    player.x = nx;
    player.y = ny;


// 仲間を追従させる
party.forEach((friend, i) => {

    const pos = trail[i];

    if(pos){
        friend.x = pos.x;
        friend.y = pos.y;
    }

});
}

if(map[player.y][player.x] === 3){

    nextArea();
}

if(map[player.y][player.x] === 4){
    visitInn();
     draw();
        return;   // ←追加
}
    draw();

    if(!inBattle){
        let encounterRate = Math.random();

        if(encounterRate < 0.08){
            startGame('N2');
        }
    }
    if(
    currentMapIndex >= 18 &&
    currentMapIndex < 24 &&
    !hasIceSword &&
    Math.random() < 0.003
){
    getIceSword();
    return;
}

}
