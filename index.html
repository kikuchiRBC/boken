function generateMap(){

    const rows = 13;
    const cols = 13;

    const map = [];

    for(let y=0;y<rows;y++){

        map[y] = [];

        for(let x=0;x<cols;x++){

            if(
                y===0 ||
                y===rows-1 ||
                x===0 ||
                x===cols-1
            ){
                map[y][x] = 1;
            }else{
                map[y][x] = 0;
            }
        }
    }

    // 木配置
    const treeCount =
        Math.floor(Math.random()*10)+20;

    for(let i=0;i<treeCount;i++){

        const x = Math.floor(Math.random()*11)+1;
        const y = Math.floor(Math.random()*11)+1;

        if(!(x===1 && y===1)){

            map[y][x] = 2;
        }
    }

    // 階段配置
    let sx, sy;

    do{

        sx = Math.floor(Math.random()*11)+1;
        sy = Math.floor(Math.random()*11)+1;

    }while(map[sy][sx] !== 0);


    map[sy][sx] = 3;

    // スタート周辺を空ける
    map[1][1] = 0;
    map[1][2] = 0;
    map[2][1] = 0;
    map[2][2] = 0;

    return map;
}

function returnToField(){

    inBattle = false;

    document.querySelector(".crossKey").style.display = "flex";

    document.getElementById("game-container").style.display = "none";
    document.getElementById("field-screen").style.display = "block";

    battleBgm.pause();
    bossBgm.pause();

    winBgm.pause();
    winBgm.currentTime = 0;

    if(fieldBgm.paused){
        fieldBgm.currentTime = 0;
        fieldBgm.play();
    }
}
   draw();
 


function startGametitle(){

    document.querySelector(".crossKey").style.display = "flex";

    fieldBgm.currentTime = 0;
    fieldBgm.play();

    document.getElementById("titleScreen").style.display = "none";
    document.getElementById("field-screen").style.display = "block";

    draw();
}


function pressOK() {

    if(eventMode){

        eventIndex++;

        if(eventIndex >= eventMessages.length){

            closeEvent();
            return;
        }

        showEventMessage();
        return;
    }

    if (battleWin) {

        battleWin = false;
        changeMonster();
        returnToField();
        winBgm.pause();
winBgm.currentTime = 0;

    }
}
function regenerateMap(){

    // 戦闘中は使えない
    if(inBattle) return;

    maps[currentMapIndex] = generateMap();

    map = maps[currentMapIndex];

    // プレイヤー位置リセット
    player.x = 1;
    player.y = 1;

    // 仲間位置リセット
    trail = [];

    for(let i=0;i<(party.length+1)*5;i++){
        trail.push({
            x:1,
            y:1
        });
    }

    party.forEach(friend=>{
        friend.x = 1;
        friend.y = 1;
    });

    draw();
}
